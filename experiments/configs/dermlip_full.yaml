# Main run: DermLIP encoder, sequential bottleneck training, full pipeline.
# Overrides fields of fbc.config.TrainConfig.
name: dermlip_full
seed: 1337
encoder: dermlip
concept_hidden: 256
diagnosis_hidden: 128
dropout: 0.1
lr: 0.001
weight_decay: 0.0001
batch_size: 256
epochs_concept: 100
epochs_diagnosis: 100
training_mode: sequential      # sequential | joint
concept_loss_weight: 1.0
faithfulness_reg: 0.0

datasets:
  train: [derm7pt]
  concept_validation: [ph2]
  fairness: [fitzpatrick17k, pad_ufes_20]
